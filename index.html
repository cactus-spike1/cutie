<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For my beloved cutie</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100%;
        height: 100vh;
        background-color: #000;
        color: #fff;
        font-family: 'Arial', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .root {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
      }

      .timer {
        display: flex;
        gap: 1.5rem;
        align-items: center;
        justify-content: center;
        font-weight: 700;
      }

      .unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #fff;
      }

      .value {
        font-size: 4.5rem;
        line-height: 1;
        padding: 0.1rem 0.4rem;
        transition: transform .25s ease, text-shadow .3s ease;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .label {
        font-size: 1rem;
        opacity: 0.85;
        margin-top: 6px;
      }

      .value.pulse {
        animation: pop .5s ease;
      }

      @keyframes pop {
        0% { transform: scale(1); }
        50% { transform: scale(1.15); text-shadow: 0 0 30px rgba(255,50,50,0.9); }
        100% { transform: scale(1); }
      }

      h1 {
        font-size: 4rem;
        text-align: center;
        animation: fadeInScale 1s ease-in-out;
        font-weight: bold;
      }

      @keyframes fadeInScale {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .heart {
        position: fixed;
        width: 30px;
        height: 30px;
        pointer-events: none;
        animation: fall linear forwards;
        font-size: 2rem;
      }

      .heart::before {
        content: '❤️';
        display: block;
      }

      @keyframes fall {
        0% {
          top: -50px;
          opacity: 1;
          transform: translateX(0);
        }
        100% {
          top: 100vh;
          opacity: 0;
          transform: translateX(50px);
        }
      }

      .tooltip {
        position: fixed;
        background-color: rgba(255, 255, 255, 0.9);
        color: #000;
        padding: 10px 15px;
        border-radius: 5px;
        font-size: 1rem;
        pointer-events: none;
        z-index: 1000;
        white-space: nowrap;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }

      .comment {
        position: fixed;
        left: 50%;
        top: -100px;
        transform: translateX(-50%);
        font-size: 2.5rem;
        color: #fff;
        text-align: center;
        max-width: 80vw;
        animation: scrollDown 4s ease-in forwards;
        pointer-events: none;
        z-index: 100;
        font-style: italic;
        letter-spacing: 3px;
        text-shadow: 0 0 15px rgba(255, 255, 255, 0.6), 0 0 30px rgba(255, 50, 50, 0.4);
        font-weight: bold;
        white-space: pre-wrap;
        word-wrap: break-word;
      }

      @keyframes scrollDown {
        0% {
          top: -100px;
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          top: 110vh;
          opacity: 0;
        }
      }

      @media (max-width: 768px) {
        .timer {
          font-size: 1.5rem;
        }
        h1 {
          font-size: 2rem;
        }
        .comment {
          font-size: 1rem;
        }
      }
      .value { display: inline-flex; flex-direction: column; align-items: center; }
.digit { line-height: 1; }
    </style>
  </head>
  <body>
    <div class="root"></div>
    <script src="comments.js"></script>
    <script src="main.js"></script>
  </body>
</html>
